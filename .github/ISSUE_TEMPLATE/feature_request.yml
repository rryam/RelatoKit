name: Feature request
description: Suggest a RelatoKit improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow should RelatoKit make easier?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What command or behavior would you like?
    validations:
      required: true
  - type: checkboxes
    id: boundary
    attributes:
      label: Project Boundary
      options:
        - label: This request does not require bypassing entitlements, forging Apple credentials, disabling platform security, or private headless submission.
          required: true
